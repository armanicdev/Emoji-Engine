# Upload static files to Hostinger over FTP (no Node — no build).
# Runs on every push to `main` / `master` (including PR merges).

name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: public_html/flagoji/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/dist/**
            package.json
            package-lock.json
            scripts/**
            **/*.md
            .gitignore
            **/.env
            **/.env.*
            lighthouse-report.json
          dangerous-clean-slate: false
